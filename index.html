
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Issues Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<!-- css link -->
<link rel="stylesheet" href="style.css">


</head>
<body>

<div id="login-page">
  <div class="login-box">
    <img id="login-logo"  class="login-logo" alt="GitHub"/>
    <div class="login-title">GitHub Issues Tracker</div>
    <div class="login-subtitle">Sign in to manage your issues</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter Username"/>
      <div class="default-hint">Default: admin</div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter Password"/>
      <div class="default-hint">Default: admin123</div>
    </div>
    <div class="login-error" id="login-error">Invalid username or password</div>
    <button class="btn-signin" onclick="handleLogin()">Sign In</button>
    <div class="or-divider">OR</div>
    <div class="demo-creds">
      Demo Credentials:<br/>
      <strong>Username:</strong> admin<br/>
      <strong>Password:</strong> admin123
    </div>
  </div>
</div>

<div id="main-page">
  <nav class="navbar">
    <a class="navbar-brand" href="#">
      <img id="nav-logo" alt="GitHub"/>
      <span>GitHub Issues Tracker</span>
    </a>
    <div class="navbar-right">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search issues..." oninput="handleSearch(this.value)"/>
      </div>
      <button class="btn-new">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Issue
      </button>
    </div>
  </nav>
  <div class="main-content">
    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('all', this)">All</button>
      <button class="tab-btn" onclick="setTab('open', this)">Open</button>
      <button class="tab-btn" onclick="setTab('closed', this)">Closed</button>
    </div>
    <div class="issues-header">
      <div class="issues-header-left">
        <img id="aperture-img" alt="Issues"/>
        <div>
          <div class="issues-count" id="issues-count">0 Issues</div>
          <div class="issues-subtext">Track and manage your project issues</div>
        </div>
      </div>
      <div class="issues-legend">
        <div class="legend-item"><div class="dot dot-open"></div> Open</div>
        <div class="legend-item"><div class="dot dot-closed"></div> Closed</div>
      </div>
    </div>
    <div id="issues-container">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    <div id="modal-inner"></div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
